<script>
        const tg = window.Telegram.WebApp;
        const API = "https://heroism-parasite-denim.ngrok-free.dev"; 
        let adminUsersData = [];

        // Функция отправки защищенных заголовков
        function getHeaders() {
            if (!tg.initData) {
                tg.showAlert("⚠️ Ошибка: телефон не передал данные профиля. Перезапустите бота.");
                return {};
            }
            return {
                'X-Telegram-Auth': tg.initData, // <-- Наш спаситель!
                'ngrok-skip-browser-warning': '1',
                'Content-Type': 'application/json'
            };
        }

        async function loadData() {
            try {
                const hdrs = getHeaders();
                if (!hdrs['X-Telegram-Auth']) return;

                const r = await fetch(`${API}/api/init`, { headers: hdrs });
                if (!r.ok) {
                    if(r.status === 403) tg.showAlert("Ошибка 403: Доступ запрещен (телефон не передал ключ).");
                    return;
                }
                const d = await r.json();
                
                document.getElementById('user-name').innerText = d.user.name;
                document.getElementById('avatar').innerText = d.user.name[0];
                
                if (d.user.is_banned) {
                    document.getElementById('banned-alert').style.display = 'block'; document.getElementById('key-card').style.display = 'none';
                    document.getElementById('status-sub').innerHTML = `<span class="status-badge expired">Забанен</span>`;
                } else {
                    document.getElementById('status-sub').innerHTML = d.user.is_active ? `<span class="status-badge">До ${d.user.expiry}</span>` : `<span class="status-badge expired">Истекла</span>`;
                    document.getElementById('vless-key').value = d.user.key || "";
                    document.getElementById('btn-gen-key').innerText = d.user.key ? "Обновить" : "Создать ключ";
                }

                document.getElementById('stat-up').innerText = d.stats.up + " MB"; document.getElementById('stat-down').innerText = d.stats.down + " MB";
                document.getElementById('ref-count').innerText = d.ref.count; document.getElementById('ref-link').value = d.ref.link;
                
                if (d.user.is_admin) { document.getElementById('nav-admin').style.display = 'flex'; loadAdminData(); }
            } catch(e) { tg.showAlert("Ошибка связи с сервером"); }
        }

        async function generateKey() {
            if(!confirm("Сгенерировать/сбросить ключ?")) return;
            const r = await fetch(`${API}/api/user/generate_key`, { method: 'POST', headers: getHeaders() });
            const d = await r.json();
            document.getElementById('vless-key').value = d.key; document.getElementById('btn-gen-key').innerText = "Обновить";
            tg.showAlert("Ключ готов!");
        }
        
        function checkStatus() { tg.showAlert("Статус проверяется. Отдача: " + document.getElementById('stat-up').innerText); }

        async function loadAdminData() {
            const r = await fetch(`${API}/api/admin/data`, { headers: getHeaders() });
            const d = await r.json();
            adminUsersData = d.users;
            document.getElementById('server-stats').innerHTML = `Сеть: UP ${d.network.up}MB | DL ${d.network.down}MB<br><br>${d.server.replace(/\n/g, '<br>')}`;
            renderUsers();

            document.getElementById('static-list').innerHTML = d.statics.map(p => `
                <div class="card" style="padding:10px; font-size:12px;">
                    <b>${p.name}</b> <button class="btn btn-danger" style="padding:4px; margin:0; width:auto; float:right;" onclick="apiAction('static','delete',${p.id})">Удалить</button><br>
                    <input type="text" value="${p.url}" readonly onclick="navigator.clipboard.writeText(this.value); tg.showAlert('Скопировано')">
                </div>
            `).join('');
        }

        function renderUsers() {
            const filter = document.getElementById('user-filter').value;
            let html = "";
            adminUsersData.forEach(u => {
                if(filter === 'active' && !u.is_active) return;
                if(filter === 'inactive' && u.is_active) return;
                html += `
                <div class="card" style="padding:12px; font-size:12px; cursor:pointer; ${u.banned ? 'border-color: var(--red);' : ''}" onclick='openUserModal(${JSON.stringify(u)})'>
                    <div style="display:flex; justify-content:space-between;">
                        <b>${u.name}</b> <span style="color:var(--text-dim)">ID: ${u.id}</span>
                    </div>
                    <div style="margin-top:5px;">
                        ${u.banned ? '<span style="color:var(--red)">БАН</span>' : (u.is_active ? `<span style="color:var(--green)">До: ${u.expiry}</span>` : `<span style="color:var(--red)">Истекла: ${u.expiry}</span>`)}
                        <br><span style="color:var(--text-dim)">@${u.username}</span>
                    </div>
                </div>`;
            });
            document.getElementById('user-list-container').innerHTML = html || "<p style='text-align:center; color:var(--text-dim)'>Пусто</p>";
        }

        function openUserModal(u) {
            document.getElementById('um-name').innerText = u.name;
            document.getElementById('um-id').value = u.id;
            document.getElementById('um-key').value = u.key || 'Нет ключа';
            document.getElementById('um-ban-btn').innerText = u.banned ? "Разбанить" : "Бан";
            document.getElementById('um-m').value = 0; document.getElementById('um-d').value = 0;
            document.getElementById('um-h').value = 0; document.getElementById('um-min').value = 0;
            document.getElementById('user-modal').classList.add('active');
        }
        function closeModal() { document.getElementById('user-modal').classList.remove('active'); }

        async function manageTime(action) {
            const data = { action: action, months: document.getElementById('um-m').value, days: document.getElementById('um-d').value, hours: document.getElementById('um-h').value, minutes: document.getElementById('um-min').value };
            await fetch(`${API}/api/admin/time/${document.getElementById('um-id').value}`, { method: 'POST', headers: getHeaders(), body: JSON.stringify(data) });
            tg.showAlert("Время обновлено!"); closeModal(); loadAdminData();
        }

        async function toggleBan() {
            const action = document.getElementById('um-ban-btn').innerText === "Бан" ? "ban" : "unban";
            await apiAction('ban', action, document.getElementById('um-id').value); closeModal();
        }

        async function promptReceipt() {
            let url = prompt("Введите ссылку на чек:");
            if(url) { await fetch(`${API}/api/admin/action/notify/receipt/${document.getElementById('um-id').value}`, { method: 'POST', headers: getHeaders(), body: JSON.stringify({url}) }); tg.showAlert("Чек отправлен!"); }
        }

        async function promptEmail() {
            let em = prompt("Введите Email получателя:");
            if(em) { await fetch(`${API}/api/admin/action/notify/email/${document.getElementById('um-id').value}`, { method: 'POST', headers: getHeaders(), body: JSON.stringify({email: em}) }); tg.showAlert("Письмо отправлено!"); }
        }

        async function apiAction(obj, action, target) {
            await fetch(`${API}/api/admin/action/${obj}/${action}/${target}`, { method: 'POST', headers: getHeaders() });
            tg.showAlert("Выполнено!"); loadAdminData();
        }

        const tpls = {
            manual: "",
            discount: "🎉 <b>Специальное предложение!</b>\n\nТолько сейчас отличные скидки на продление подписки. Успейте воспользоваться!",
            maintenance: "🛠 <b>Технические работы</b>\n\nНа сервере плановые работы. VPN временно недоступен. Приносим извинения! 🙏",
            update: "⚡️ <b>Важное обновление!</b>\n\nКонфигурация серверов обновлена. Пожалуйста, зайдите в меню и нажмите «Обновить ключ»."
        };
        function applyTemplate() { document.getElementById('bc-text').value = tpls[document.getElementById('bc-template').value]; }

        async function sendBroadcast() {
            const data = { target: document.getElementById('bc-target').value, text: document.getElementById('bc-text').value, btn_name: document.getElementById('bc-btn-name').value, btn_url: document.getElementById('bc-btn-url').value };
            if(!data.text || !confirm("Запустить рассылку?")) return;
            await fetch(`${API}/api/admin/broadcast`, { method: 'POST', headers: getHeaders(), body: JSON.stringify(data) });
            tg.showAlert("Рассылка завершена!"); document.getElementById('bc-text').value = '';
        }

        async function createStatic() {
            const name = document.getElementById('new-static-name').value;
            if(!name) return;
            await apiAction('static', 'create', name); document.getElementById('new-static-name').value = '';
        }

        function switchTab(id, el) { document.querySelectorAll('.tab-content, .nav-item').forEach(e => e.classList.remove('active')); document.getElementById(id).classList.add('active'); el.classList.add('active'); }
        function switchAdmin(id, el) { document.querySelectorAll('#adm-users, #adm-server, #adm-mass').forEach(e => e.style.display = 'none'); document.querySelectorAll('.admin-tab').forEach(e => e.classList.remove('active')); document.getElementById(id).style.display = 'block'; el.classList.add('active'); }
        function copyKey() { navigator.clipboard.writeText(document.getElementById('vless-key').value); tg.showAlert("Ключ скопирован!"); }
        function copyRef() { navigator.clipboard.writeText(document.getElementById('ref-link').value); tg.showAlert("Ссылка скопирована!"); }
        function buy(m, p) { tg.sendData(JSON.stringify({action: 'buy', months: m, price: p})); tg.close(); }

        tg.ready(); tg.expand(); loadData();
    </script>
