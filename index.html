<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VPN Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #000;
            --card-bg: #1c1c1e;
            --accent-color: #007aff;
            --text-main: #ffffff;
            --text-secondary: #8e8e93;
            --success: #30d158;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0; padding: 16px;
            overflow-x: hidden;
        }
        /* Карточки */
        .card { background: var(--card-bg); border-radius: 16px; padding: 20px; margin-bottom: 16px; }
        .profile-header { display: flex; align-items: center; gap: 15px; }
        .avatar { width: 50px; height: 50px; background: var(--accent-color); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; }
        
        /* Статус */
        .status-badge { background: rgba(48, 209, 88, 0.1); color: var(--success); padding: 12px; border-radius: 12px; text-align: center; font-weight: 600; margin-top: 15px; border: 1px solid rgba(48, 209,  green, 0.2); }
        
        /* Ключ */
        .key-container { background: #2c2c2e; border-radius: 12px; display: flex; align-items: center; padding: 10px; margin-top: 10px; }
        .key-container input { background: transparent; border: none; color: var(--text-secondary); flex: 1; font-family: monospace; outline: none; }
        .copy-btn { background: var(--accent-color); color: #fff; border: none; border-radius: 8px; padding: 8px 15px; font-weight: 600; }

        /* Статистика */
        .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .stat-item { background: var(--card-bg); padding: 15px; border-radius: 16px; display: flex; flex-direction: column; }
        .stat-label { color: var(--text-secondary); font-size: 12px; margin-bottom: 5px; }
        .stat-value { font-size: 18px; font-weight: bold; }

        /* Навигация */
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(28, 28, 30, 0.8); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #333; }
        .nav-item { color: var(--text-secondary); text-decoration: none; font-size: 11px; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-item.active { color: var(--accent-color); }
        .tab-content { display: none; padding-bottom: 80px; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>

    <div id="tab-profile" class="tab-content active">
        <div class="profile-header">
            <div class="avatar" id="avatar">?</div>
            <div>
                <div id="user-name" style="font-size: 20px; font-weight: bold;">Загрузка...</div>
                <div id="user-id" style="color: var(--text-secondary); font-size: 14px;">ID: ---</div>
            </div>
        </div>

        <div class="status-badge" id="status-text">Подписка активна</div>

        <div class="card" style="margin-top: 20px;">
            <div style="font-size: 14px; margin-bottom: 8px;">Ключ для подключения (VLESS)</div>
            <div class="key-container">
                <input type="text" id="vless-key" value="..." readonly>
                <button class="copy-btn" onclick="copyKey()">Копировать</button>
            </div>
        </div>

        <div class="stats-row">
            <div class="stat-item">
                <span class="stat-label">📥 Скачано</span>
                <span class="stat-value" id="stat-down">0.0 MB</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">📤 Отдано</span>
                <span class="stat-value" id="stat-up">0.0 MB</span>
            </div>
        </div>
    </div>

   <div id="tab-shop" class="tab-content">
        <h2 style="margin-top: 0;">Выберите тариф</h2>
        
        <div class="card" style="border: 1px solid var(--accent-color);">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <h3 style="margin: 0;">🚀 Премиум (1 мес.)</h3>
                <span style="background: var(--accent-color); color: white; padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: bold;">ХИТ</span>
            </div>
            <p style="color: var(--text-secondary); font-size: 14px; margin-top: 0;">Безлимитный трафик, 5 локаций</p>
            <div style="font-size: 24px; font-weight: bold; margin-bottom: 15px;">150 ₽</div>
            <button class="copy-btn" style="width: 100%; padding: 15px;" onclick="buyTariff(1, 150)">Оплатить</button>
        </div>

        <div class="card">
            <h3 style="margin: 0; margin-bottom: 10px;">💎 Премиум (3 мес.)</h3>
            <p style="color: var(--text-secondary); font-size: 14px; margin-top: 0;">Скидка 10%</p>
            <div style="font-size: 24px; font-weight: bold; margin-bottom: 15px;">400 ₽</div>
            <button class="copy-btn" style="width: 100%; padding: 15px; background: #2c2c2e; color: #fff;" onclick="buyTariff(3, 400)">Оплатить</button>
        </div>
        
        <div class="card">
            <h3 style="margin: 0; margin-bottom: 10px;">👑 Премиум (Год)</h3>
            <p style="color: var(--text-secondary); font-size: 14px; margin-top: 0;">Максимальная выгода</p>
            <div style="font-size: 24px; font-weight: bold; margin-bottom: 15px;">1200 ₽</div>
            <button class="copy-btn" style="width: 100%; padding: 15px; background: #2c2c2e; color: #fff;" onclick="buyTariff(12, 1200)">Оплатить</button>
        </div>
    </div>

    <nav class="nav-bar">
        <a href="#" class="nav-item active" onclick="switchTab('tab-profile', this)"><span>👤</span>Профиль</a>
        <a href="#" class="nav-item" onclick="switchTab('tab-shop', this)"><span>🛒</span>Магазин</a>
        <a href="#" class="nav-item" onclick="tg.close()"><span>❌</span>Выйти</a>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        const API_URL = "https://heroism-parasite-denim.ngrok-free.dev/api/init"; // ЗАМЕНИ МЕНЯ

       async function loadData() {
            try {
                const response = await fetch(API_URL, {
                    headers: { 
                        'Authorization': tg.initData,
                        'ngrok-skip-browser-warning': 'true'  /* <-- Эта магия отключает окно ngrok */
                    }
                });
                
                if (!response.ok) throw new Error('Ошибка сервера: ' + response.status);
                const data = await response.json();

                document.getElementById('user-name').innerText = data.user.name;
                document.getElementById('user-id').innerText = 'ID: ' + data.user.id;
                document.getElementById('avatar').innerText = data.user.name.charAt(0);
                document.getElementById('status-text').innerText = 'Активна до ' + data.user.expiry;
                document.getElementById('vless-key').value = data.user.key;
                document.getElementById('stat-up').innerText = data.stats.up + ' MB';
                document.getElementById('stat-down').innerText = data.stats.down + ' MB';
            } catch (e) {
                tg.showAlert("Ошибка связи с сервером");
            }
        }

        function switchTab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        function copyKey() {
            const input = document.getElementById('vless-key');
            navigator.clipboard.writeText(input.value);
            tg.showScanQrPopup({text: "Ключ скопирован!"}); // Просто для эффекта
            setTimeout(() => tg.closeScanQrPopup(), 1000);
        }

        tg.expand();
        loadData();
    </script>
</body>
</html>
