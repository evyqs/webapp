<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VPN App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0b0b0c; --card: #18181b; --accent: #2563eb; --red: #ef4444; --green: #10b981; --text: #f8fafc; --text-dim: #94a3b8; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 16px 16px 100px; }
        .card { background: var(--card); border-radius: 16px; padding: 16px; margin-bottom: 12px; border: 1px solid #27272a; }
        .btn { background: var(--accent); color: white; border: none; border-radius: 10px; padding: 12px; width: 100%; font-weight: 600; cursor: pointer; margin-top: 8px; }
        .btn-secondary { background: #27272a; color: var(--text); }
        .btn-danger { background: rgba(239, 68, 68, 0.2); color: var(--red); }
        .nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(11,11,12,0.9); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 12px; border-top: 1px solid #27272a; z-index: 100;}
        .nav-item { color: var(--text-dim); text-decoration: none; font-size: 11px; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-item.active { color: var(--accent); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .admin-nav { display: flex; gap: 5px; overflow-x: auto; margin-bottom: 15px; }
        .admin-tab { padding: 8px 12px; background: #27272a; border-radius: 8px; font-size: 12px; white-space: nowrap; cursor: pointer; }
        .admin-tab.active { background: var(--accent); }
        .status-badge { padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: bold; background: #064e3b; color: var(--green); }
        .status-badge.expired { background: #450a0a; color: var(--red); }
        input, textarea, select { width: 100%; background: #0f172a; border: 1px solid #1e293b; padding: 10px; border-radius: 8px; color: var(--text); box-sizing: border-box; font-family: inherit; margin-bottom: 10px;}
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 1000; padding: 20px; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: var(--card); padding: 20px; border-radius: 16px; width: 100%; max-width: 400px; border: 1px solid #27272a; }
    </style>
</head>
<body>

    <div id="tab-profile" class="tab-content active">
        <div style="display: flex; gap: 15px; margin-bottom: 20px; align-items: center;">
            <div id="avatar" style="width: 50px; height: 50px; background: var(--accent); border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold;">?</div>
            <div>
                <div id="user-name" style="font-size: 18px; font-weight: bold;">Загрузка...</div>
                <div id="status-sub"></div>
            </div>
        </div>
        <div class="card" id="key-card">
            <span style="color: var(--text-dim); font-size: 12px;">Ваш VLESS ключ</span>
            <input type="text" id="vless-key" readonly>
            <button class="btn" onclick="copyKey()">Копировать ключ</button>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div class="card"><span>📥 Скачано</span><br><b id="stat-down">0 MB</b></div>
            <div class="card"><span>📤 Отдано</span><br><b id="stat-up">0 MB</b></div>
        </div>
    </div>

    <div id="tab-shop" class="tab-content">
        <h2>Магазин</h2>
        <div class="card">🚀 1 месяц / 150 ₽ <button class="btn" onclick="buy(1, 150)">Купить</button></div>
    </div>

    <div id="tab-admin" class="tab-content">
        <h2>Админ-панель</h2>
        <div id="user-list-container"></div>
    </div>

    <nav class="nav">
        <a href="#" class="nav-item active" onclick="switchTab('tab-profile', this)">Профиль</a>
        <a href="#" class="nav-item" onclick="switchTab('tab-shop', this)">Магазин</a>
        <a href="#" id="nav-admin" class="nav-item" style="display: none;" onclick="switchTab('tab-admin', this)">Админ</a>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        const API = "https://heroism-parasite-denim.ngrok-free.dev";

        // 1. Функция получения данных авторизации
        function getInitData() {
            if (tg.initData) return tg.initData;
            const urlParams = new URLSearchParams(window.location.hash.slice(1));
            return urlParams.get('tgWebAppData');
        }

        // 2. ФУНКЦИЯ ЗАПРОСОВ К API (ТЕПЕРЬ ОНА ОПРЕДЕЛЕНА!)
        async function apiFetch(path, options = {}) {
            const authData = getInitData();
            if (!authData) return null;
            const url = `${API}${path}${path.includes('?') ? '&' : '?'}auth=${encodeURIComponent(authData)}`;
            options.headers = { ...options.headers, 'ngrok-skip-browser-warning': '1' };
            return fetch(url, options);
        }

        async function loadData() {
            try {
                const r = await apiFetch("/api/init");
                if (!r || !r.ok) {
                    tg.showAlert("Ошибка сервера. Проверьте логи pm2.");
                    return;
                }
                const d = await r.json();
                document.getElementById('user-name').innerText = d.user.name;
                document.getElementById('avatar').innerText = d.user.name[0].toUpperCase();
                document.getElementById('vless-key').value = d.user.key || "";
                document.getElementById('stat-up').innerText = d.stats.up + " MB";
                document.getElementById('stat-down').innerText = d.stats.down + " MB";

                if (d.user.is_admin) {
                    document.getElementById('nav-admin').style.display = 'flex';
                    loadAdminData();
                }
            } catch (e) {
                tg.showAlert("Критическая ошибка JS: " + e.message);
            }
        }

        async function loadAdminData() {
            const r = await apiFetch("/api/admin/data");
            const d = await r.json();
            document.getElementById('user-list-container').innerHTML = d.users.map(u => `
                <div class="card">${u.name} (ID: ${u.id})</div>
            `).join('');
        }

        function switchTab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        function copyKey() {
            const copyText = document.getElementById("vless-key");
            copyText.select();
            document.execCommand("copy");
            tg.showAlert("Ключ скопирован!");
        }

        function buy(m, p) {
            tg.sendData(JSON.stringify({action: 'buy', months: m, price: p}));
            tg.close();
        }

        tg.ready();
        tg.expand();
        loadData();
    </script>
</body>
</html>
