<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VPN App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0b0b0c; --card: #18181b; --accent: #2563eb; --red: #ef4444; --green: #10b981; --text: #f8fafc; --text-dim: #94a3b8; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 16px 16px 100px; }
        .card { background: var(--card); border-radius: 16px; padding: 16px; margin-bottom: 12px; border: 1px solid #27272a; }
        .btn { background: var(--accent); color: white; border: none; border-radius: 10px; padding: 12px; width: 100%; font-weight: 600; cursor: pointer; margin-top: 8px; }
        .btn-secondary { background: #27272a; color: var(--text); }
        .btn-danger { background: rgba(239, 68, 68, 0.2); color: var(--red); }
        .nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(11,11,12,0.9); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 12px; border-top: 1px solid #27272a; z-index: 100;}
        .nav-item { color: var(--text-dim); text-decoration: none; font-size: 11px; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-item.active { color: var(--accent); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .admin-nav { display: flex; gap: 5px; overflow-x: auto; margin-bottom: 15px; }
        .admin-tab { padding: 8px 12px; background: #27272a; border-radius: 8px; font-size: 12px; white-space: nowrap; cursor: pointer; }
        .admin-tab.active { background: var(--accent); }
        .status-badge { padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: bold; background: #064e3b; color: var(--green); }
        .status-badge.expired { background: #450a0a; color: var(--red); }
        input, textarea, select { width: 100%; background: #0f172a; border: 1px solid #1e293b; padding: 10px; border-radius: 8px; color: var(--text); box-sizing: border-box; font-family: inherit; margin-bottom: 10px;}
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 1000; padding: 20px; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: var(--card); padding: 20px; border-radius: 16px; width: 100%; max-width: 400px; border: 1px solid #27272a; max-height: 80vh; overflow-y: auto;}
    </style>
</head>
<body>
    <div id="tab-profile" class="tab-content active">
        <div style="display: flex; gap: 15px; margin-bottom: 20px; align-items: center;">
            <div id="avatar" style="width: 50px; height: 50px; background: var(--accent); border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold;">?</div>
            <div><div id="user-name" style="font-size: 18px; font-weight: bold;">Загрузка...</div><div id="status-sub"></div></div>
        </div>
        <div id="banned-alert" class="card" style="display: none; border-color: var(--red); background: rgba(239,68,68,0.1);">
            <h3 style="color: var(--red); margin: 0;">🚫 Вы заблокированы</h3>
        </div>
        <div class="card" id="key-card">
            <span style="color: var(--text-dim); font-size: 12px;">Ваш VLESS ключ</span>
            <input type="text" id="vless-key" readonly>
            <div style="display: flex; gap: 10px;">
                <button class="btn" onclick="copyKey()">Копировать</button>
                <button class="btn btn-secondary" onclick="generateKey()" id="btn-gen-key">Сбросить</button>
            </div>
            <button class="btn btn-secondary" style="margin-top: 10px;" onclick="checkStatus()">🔍 Статус подключения (Сервер)</button>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div class="card"><span style="color: var(--text-dim); font-size: 12px;">📥 Скачано</span><br><b style="font-size: 18px;" id="stat-down">0 MB</b></div>
            <div class="card"><span style="color: var(--text-dim); font-size: 12px;">📤 Отдано</span><br><b style="font-size: 18px;" id="stat-up">0 MB</b></div>
        </div>
        <div class="card">
            <h3 style="margin: 0 0 10px 0;">🎁 Партнерская программа</h3>
            <p style="font-size: 13px; color: var(--text-dim); margin-top:0;">Приглашено: <b id="ref-count">0</b> чел.</p>
            <input type="text" id="ref-link" readonly>
            <button class="btn btn-secondary" onclick="copyRef()">Поделиться ссылкой</button>
        </div>
    </div>

    <div id="tab-shop" class="tab-content">
        <h2>Магазин</h2>
        <div class="card"><h3>🚀 1 месяц</h3><b style="font-size: 20px;">150 ₽</b><button class="btn" onclick="buy(1, 150)">Оплатить</button></div>
        <div class="card" style="border-color: var(--accent)"><h3>💎 3 месяца</h3><b style="font-size: 20px;">400 ₽</b><button class="btn" onclick="buy(3, 400)">Оплатить</button></div>
    </div>

    <div id="tab-help" class="tab-content">
        <h2>Инструкции</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="btn btn-secondary" onclick="tg.showAlert('AppStore -> FoXray -> + -> Import from Clipboard')">🍏 iOS</button>
            <button class="btn btn-secondary" onclick="tg.showAlert('Google Play -> v2rayNG -> + -> Импорт из буфера')">🤖 Android</button>
        </div>
        <button class="btn" style="margin-top: 20px;" onclick="tg.sendData('support'); tg.close();">🆘 Написать в поддержку</button>
    </div>

    <div id="tab-admin" class="tab-content">
        <h2>Управление</h2>
        <div class="admin-nav">
            <div class="admin-tab active" onclick="switchAdmin('adm-users', this)">Пользователи</div>
            <div class="admin-tab" onclick="switchAdmin('adm-mass', this)">Рассылка</div>
            <div class="admin-tab" onclick="switchAdmin('adm-server', this)">Сервер & Статика</div>
        </div>
        <div id="adm-users"><div id="user-list-container"></div></div>
        <div id="adm-mass" style="display:none;"><div class="card"><textarea id="bc-text" rows="6" placeholder="Текст рассылки..."></textarea><button class="btn" onclick="sendBroadcast()">Отправить</button></div></div>
        <div id="adm-server" style="display:none;"><div class="card" style="font-family: monospace; font-size: 11px; color: var(--green);" id="server-stats"></div></div>
    </div>

    <div class="modal" id="user-modal">
        <div class="modal-content">
            <h3 id="um-name" style="margin-top: 0;">User</h3>
            <input type="hidden" id="um-id">
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button class="btn btn-danger" id="um-ban-btn" onclick="toggleBan()">Бан</button>
                <button class="btn btn-secondary" onclick="closeModal()">Закрыть</button>
            </div>
        </div>
    </div>

    <nav class="nav">
        <a href="#" class="nav-item active" onclick="switchTab('tab-profile', this)"><span>👤</span>Профиль</a>
        <a href="#" class="nav-item" onclick="switchTab('tab-shop', this)"><span>🛒</span>Магазин</a>
        <a href="#" class="nav-item" onclick="switchTab('tab-help', this)"><span>❓</span>Помощь</a>
        <a href="#" id="nav-admin" class="nav-item" style="display: none;" onclick="switchTab('tab-admin', this)"><span>⚙️</span>Админ</a>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        const API = "https://heroism-parasite-denim.ngrok-free.dev"; 
        let adminUsersData = [];

        function getInitData() {
            if (tg.initData) return tg.initData;
            const urlParams = new URLSearchParams(window.location.hash.slice(1));
            return urlParams.get('tgWebAppData');
        }

        async function loadData(retryCount = 0) {
            const authData = getInitData();
            
            if (!authData && retryCount < 5) {
                // Если данных нет, ждем 200мс и пробуем снова (даем время Телеграму проснуться)
                setTimeout(() => loadData(retryCount + 1), 200);
                return;
            }

            try {
                const r = await apiFetch(`/api/init`);
                if (!r.ok) {
                    const errorText = await r.text();
                    document.body.innerHTML = `<div style="padding:20px; color:red;">
                        <h2>ОШИБКА СЕРВЕРА</h2>
                        <p>Статус: ${r.status}</p>
                        <pre style="font-size:10px;">${errorText}</pre>
                    </div>`;
                    return;
                }
                const d = await r.json();
                document.getElementById('user-name').innerText = d.user.name;
                document.getElementById('avatar').innerText = d.user.name[0].toUpperCase();
                
                if (d.user.is_banned) {
                    document.getElementById('banned-alert').style.display = 'block'; 
                    document.getElementById('key-card').style.display = 'none';
                    document.getElementById('status-sub').innerHTML = `<span class="status-badge expired">Забанен</span>`;
                } else {
                    document.getElementById('status-sub').innerHTML = d.user.is_active ? `<span class="status-badge">До ${d.user.expiry}</span>` : `<span class="status-badge expired">Истекла</span>`;
                    document.getElementById('vless-key').value = d.user.key || "";
                    document.getElementById('btn-gen-key').innerText = d.user.key ? "Обновить" : "Создать ключ";
                }

               document.getElementById('user-name').innerText = d.user.name;
                document.getElementById('avatar').innerText = d.user.name[0].toUpperCase();
                
                if (d.user.is_admin) { 
                    document.getElementById('nav-admin').style.display = 'flex'; 
                    loadAdminData(); 
                }
            } catch(e) {
                tg.showAlert("Критическая ошибка: " + e.message);
            }
        }

        async function loadAdminData() {
            const authData = getInitData();
            const r = await fetch(`${API}/api/admin/data?auth=${encodeURIComponent(authData)}`, {headers: {'ngrok-skip-browser-warning': '1'}});
            const d = await r.json();
            adminUsersData = d.users;
            document.getElementById('server-stats').innerHTML = `Сеть: UP ${d.network.up}MB | DL ${d.network.down}MB<br><br>${d.server.replace(/\n/g, '<br>')}`;
            document.getElementById('user-list-container').innerHTML = adminUsersData.map(u => `
                <div class="card" style="padding:12px; font-size:12px; cursor:pointer;" onclick='openUserModal(${JSON.stringify(u)})'>
                    <b>${u.name}</b> (ID: ${u.id})
                </div>`).join('');
        }

        function openUserModal(u) {
            document.getElementById('um-name').innerText = u.name;
            document.getElementById('um-id').value = u.id;
            document.getElementById('um-ban-btn').innerText = u.banned ? "Разбанить" : "Бан";
            document.getElementById('user-modal').classList.add('active');
        }
        function closeModal() { document.getElementById('user-modal').classList.remove('active'); }

        async function toggleBan() {
            const action = document.getElementById('um-ban-btn').innerText === "Бан" ? "ban" : "unban";
            await fetch(`${API}/api/admin/action/ban/${action}/${document.getElementById('um-id').value}?auth=${encodeURIComponent(getInitData())}`, { method: 'POST', headers: {'ngrok-skip-browser-warning': '1'} });
            closeModal(); loadAdminData();
        }

        function switchTab(id, el) { document.querySelectorAll('.tab-content, .nav-item').forEach(e => e.classList.remove('active')); document.getElementById(id).classList.add('active'); el.classList.add('active'); }
        function switchAdmin(id, el) { document.querySelectorAll('#adm-users, #adm-server, #adm-mass').forEach(e => e.style.display = 'none'); document.querySelectorAll('.admin-tab').forEach(e => e.classList.remove('active')); document.getElementById(id).style.display = 'block'; el.classList.add('active'); }
        function copyKey() { navigator.clipboard.writeText(document.getElementById('vless-key').value); tg.showAlert("Ключ скопирован!"); }
        function copyRef() { navigator.clipboard.writeText(document.getElementById('ref-link').value); tg.showAlert("Ссылка скопирована!"); }
        function buy(m, p) { tg.sendData(JSON.stringify({action: 'buy', months: m, price: p})); tg.close(); }

        tg.ready(); tg.expand(); loadData();
    </script>
</body>
</html>
